<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pejuang Ngabuburit - RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        #game-container {
            width: 800px;
            max-width: 100%;
            background-color: #000;
            border: 4px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        #battle-screen {
            width: 100%;
            height: 350px;
            background: linear-gradient(to bottom, #4a90e2, #90c2e7);
            position: relative;
        }
        
        canvas {
            display: block;
        }

        #ui-panel {
            display: flex;
            height: 200px;
            border-top: 4px solid #fff;
            background-color: #000;
        }

        .panel-box {
            padding: 15px;
            border-right: 4px solid #fff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .panel-box:last-child {
            border-right: none;
        }

        #stats-panel {
            width: 30%;
            font-size: 12px;
            line-height: 2;
        }

        #log-panel {
            width: 45%;
            font-size: 12px;
            line-height: 1.8;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* Styling scrollbar untuk log */
        #log-panel::-webkit-scrollbar {
            width: 8px;
        }
        #log-panel::-webkit-scrollbar-track {
            background: #222; 
        }
        #log-panel::-webkit-scrollbar-thumb {
            background: #fff; 
        }

        #command-panel {
            width: 25%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-command {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 8px; /* Dikecilkan sedikit agar muat 6 tombol */
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn-command:hover:not(:disabled) {
            background-color: #fff;
            color: #000;
            transform: scale(1.05);
        }

        .btn-command:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-command:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }

        .stat-bar-container {
            width: 100%;
            background-color: #333;
            height: 12px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #fff;
        }

        .stat-bar {
            height: 100%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #iman-bar { background-color: #e74c3c; }
        #konsentrasi-bar { background-color: #3498db; }

        .time-display {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 2px solid #fff;
            font-size: 14px;
            text-shadow: 2px 2px 0 #000;
        }
        
        .enemy-info {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 2px solid #fff;
            font-size: 12px;
            text-align: right;
            text-shadow: 2px 2px 0 #000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="battle-screen">
        <canvas id="gameCanvas" width="800" height="350"></canvas>
        <div class="time-display" id="clock">Jam: 15:00</div>
        <div class="enemy-info" id="enemy-ui">
            <span id="enemy-name" style="color: #f1c40f;">Musuh</span><br>
            HP: <span id="enemy-hp">0</span>
        </div>
    </div>
    <div id="ui-panel">
        <div class="panel-box" id="stats-panel">
            <div style="color: #2ecc71;">PEJUANG TAKJIL</div>
            <div style="margin-top: 10px;">IMAN (HP)</div>
            <div class="stat-bar-container"><div class="stat-bar" id="iman-bar" style="width: 100%;"></div></div>
            <div id="iman-text">150/150</div>

            <div style="margin-top: 10px;">FOKUS (MP)</div>
            <div class="stat-bar-container"><div class="stat-bar" id="konsentrasi-bar" style="width: 100%;"></div></div>
            <div id="konsentrasi-text">50/50</div>
        </div>
        <div class="panel-box" id="log-panel">
            <div id="log-text">
                Pertarungan Ngabuburit dimulai!<br>
                Tahan godaan sampai jam 18:00!
            </div>
        </div>
        <div class="panel-box" id="command-panel">
            <!-- Tombol akan di-render secara dinamis oleh JS -->
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASI STATE GAME ---
    let timeMinutes = 15 * 60; // Mulai jam 15:00
    const endTime = 18 * 60;   // Buka Puasa jam 18:00
    let isPlayerTurn = true;
    let gameOver = false;

    // Koordinat Dasar Animasi
    const basePlayerX = 120;
    const basePlayerY = 150;
    const baseEnemyX = 550;
    const baseEnemyY = 150;

    let player = {
        maxIman: 150, iman: 150,
        maxKonsentrasi: 50, konsentrasi: 50,
        baseAttack: 20, buffTurns: 0,
        ultimateUses: 2, // Limit penggunaan pamungkas
        x: basePlayerX, y: basePlayerY,
        state: 'idle', // idle, attack, hurt, heal
        hitTimer: 0,
        level: 1,
        defenseBuffTurns: 0,
        inventory: {
            'Kurma': 3,
            'Air Putih': 2,
            'Minyak Kayu Putih': 1
        }
    };

    // Palet warna pixel art retro
    const pal = {
        0: "transparent", 1: "#000000", // outline
        // Gorengan
        2: "#d35400", 3: "#e67e22", 4: "#f1c40f", 5: "#c0392b",
        // Es Buah
        6: "#0984e3", 7: "#74b9ff", 8: "#dfe6e9", 9: "#ff7675",
        // Kolak Naga
        A: "#6c5ce7", B: "#a29bfe", C: "#fdcb6e", D: "#e84393",
        // Player (Pejuang Takjil)
        E: "#f1c27d", // Warna kulit
        F: "#27ae60", // Hijau gelap (Sarung)
        G: "#2ecc71", // Hijau terang (Sarung)
        H: "#a0522d", // Coklat (Spatula)
        I: "#ffffff", // Putih (Baju)
        J: "#2d3436"  // Abu gelap/Hitam (Peci & Rambut)
    };

    // --- DATA PIXEL ART KARAKTER ---
    // 64-bit Style Sprites (More Detail & Shading)
    const sprPlayerIdle = [
        "00000001111111000000",
        "0000001JJJJJJJ100000",
        "000001JJJJJJJJJ10000",
        "000001E11E111E110011",
        "000001EEEEEEEEE100H1",
        "000001EEEEEEEEE100H1",
        "000011IIIIIIIII110H1",
        "0001E1IIIIIIIII1E1H1",
        "0001E1IIIIIIIII1E1H1",
        "000111IIIIIIIII111H1",
        "000001FFFFFFFFF100H1",
        "000001FGGGGGGGF10011",
        "000001FGGGGGGGF10000",
        "000001FGGGGGGGF10000",
        "000001FGGGGGGGF10000",
        "00000111100011110000",
        "0000EE11000011EE0000",
        "00001111000011110000"
    ];

    const sprPlayerAttack = [
        "00000001111111000000",
        "0000001JJJJJJJ100000",
        "000001JJJJJJJJJ10000",
        "0000011EEEEEEE110000",
        "000011IIIIIIIII11000",
        "0001E1IIIIIIIII1E100",
        "000111IIIIIIIII1E111", 
        "000001IIIIIIIII1E111",
        "000001FFFFFFFFF11HHH", 
        "000001FGGGGGGGF10HHH",
        "000001FGGGGGGGF10HHH",
        "000001FGGGGGGGF10000",
        "00000111100011110000",
        "0000EE11000011EE0000",
        "00001111000011110000"
    ];

    const sprGorengan = [
        "00000011111111000000",
        "00001133333333110000",
        "00013344444444331000",
        "01134444444444443110",
        "01344444554443444310",
        "13445544554443344431",
        "13445544444443334431",
        "13344444444433334431",
        "12334444444433444321",
        "01233333333333333210",
        "01223333333333322210",
        "00122222222222222100",
        "00011111111111111000"
    ];

    const sprEsBuah = [
        "00000001111110000000",
        "00000117777771100000",
        "00011777777777711000",
        "00177788888877777100",
        "01777888888887777710",
        "01788889988998887710",
        "17888999988999988771",
        "178888898888898888771",
        "167778888888888877761",
        "01677777777777777610",
        "00166666666666666100",
        "00011111111111111000"
    ];

    const sprKolak = [
        "000000001111111000000",
        "00000011AABBBAA110000",
        "000001AABBBBBAAA10000",
        "00011AABBDDBBBAAA1100",
        "001AAABBDDDBBBAAA1110",
        "01AAABBBBBBBBBAAAAA10",
        "1AA11111AAAA11111AAA1",
        "1AA1CCC11AAA1CCC11AA1",
        "1AA1CCC11AAA1CCC11AA1",
        "1AA1CCC11AAA1CCC11AA1",
        "1AA11111AAAA11111AAA1",
        "01AAAAAA1111AAAAAA10",
        "0011AAAAAAAAAAAA1100",
        "00011111111111111000"
    ];

    const sprSirop = [
        "0000111110000",
        "0001555551000",
        "0015599551000",
        "0155944955100",
        "1559444495510",
        "1559444449551",
        "1559444449551",
        "1559444495510",
        "1559444495510",
        "1559444495510",
        "1555999955510",
        "0111111111100"
    ];

    const enemyTypes = [
        { name: "Gorengan Squad", maxHp: 60, attack: 15, type: "Fire", pixelData: sprGorengan, w: 160, h: 104 },
        { name: "Es Buah Elemental", maxHp: 80, attack: 20, type: "Ice", pixelData: sprEsBuah, w: 160, h: 96 },
        { name: "Iklan Sirop Legend", maxHp: 120, attack: 30, type: "Boss", pixelData: sprSirop, w: 104, h: 112 },
        { name: "Great Kolak Naga", maxHp: 250, attack: 40, type: "Boss", pixelData: sprKolak, w: 168, h: 112 }
    ];

    let currentEnemy = null;
    let floatingTexts = [];
    let particles = [];
    let screenShake = 0;
    
    // Lerp helper untuk animasi mulus
    const lerp = (start, end, amt) => (1 - amt) * start + amt * end;

    // Elemen DOM
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const logEl = document.getElementById("log-text");
    const clockEl = document.getElementById("clock");

    // --- LOGIKA UTAMA GAME ---

    function initGame() {
        spawnEnemy();
        updateUI();
    }

    function formatTime(minutes) {
        let h = Math.floor(minutes / 60);
        let m = minutes % 60;
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    function log(msg) {
        logEl.innerHTML += `<div style="margin-top: 8px; border-left: 3px solid #fff; padding-left: 8px;">${msg}</div>`;
        // Auto scroll mulus
        setTimeout(() => {
            logEl.scrollTo({ top: logEl.scrollHeight, behavior: 'smooth' });
        }, 50);
    }

    function addFloatingText(x, y, text, color, isCrit = false) {
        floatingTexts.push({ 
            x: x, y: y, text: text, color: color, 
            alpha: 1, life: isCrit ? 80 : 50, 
            size: isCrit ? 24 : 16,
            vy: isCrit ? -2.5 : -1.5 
        });
    }

    function createParticles(x, y, color, count, type="burst") {
        for(let i=0; i<count; i++) {
            let vx = (Math.random() - 0.5) * 8;
            let vy = (Math.random() - 0.5) * 8;
            if (type === "heal") {
                vx = (Math.random() - 0.5) * 4;
                vy = -Math.random() * 5 - 2;
            }
            particles.push({
                x: x, y: y, vx: vx, vy: vy,
                color: color, life: 30 + Math.random()*20, size: Math.random()*6 + 4
            });
        }
    }


    function updateUI() {
        let imanPct = Math.max(0, (player.iman / player.maxIman) * 100);
        let konPct = Math.max(0, (player.konsentrasi / player.maxKonsentrasi) * 100);
        
        document.getElementById("iman-bar").style.width = imanPct + "%";
        document.getElementById("iman-text").innerText = `${Math.floor(player.iman)}/${player.maxIman}`;
        
        document.getElementById("konsentrasi-bar").style.width = konPct + "%";
        document.getElementById("konsentrasi-text").innerText = `${Math.floor(player.konsentrasi)}/${player.maxKonsentrasi}`;

        clockEl.innerText = `Jam: ${formatTime(timeMinutes)}`;
        if (currentEnemy) {
            document.getElementById("enemy-name").innerText = currentEnemy.name;
            document.getElementById("enemy-hp").innerText = Math.floor(currentEnemy.hp);
        }

        renderActionButtons();
        
        // Disable lari specifically after rendering
        const btnLari = document.getElementById("btn-lari");
        if (btnLari) btnLari.disabled = (timeMinutes >= 17 * 60) || !isPlayerTurn || gameOver;
    }

    function renderActionButtons() {
        const panel = document.getElementById("command-panel");
        panel.innerHTML = "";
        
        if (isInventoryOpen) {
            for (let item in player.inventory) {
                if (player.inventory[item] > 0) {
                    const btn = document.createElement("button");
                    btn.className = "btn-command";
                    btn.innerHTML = `${item} (x${player.inventory[item]})`;
                    btn.onclick = () => useItem(item);
                    btn.disabled = !isPlayerTurn || gameOver;
                    panel.appendChild(btn);
                }
            }
            const backBtn = document.createElement("button");
            backBtn.className = "btn-command";
            backBtn.style.color = "#e74c3c";
            backBtn.style.borderColor = "#e74c3c";
            backBtn.innerHTML = "KEMBALI";
            backBtn.onclick = toggleInventory;
            panel.appendChild(backBtn);
        } else {
            const actions = [
                { id: 'btn-serang', label: 'SERANG', action: 'serang' },
                { id: 'btn-sabar', label: 'SABAR (Heal)', action: 'sabar' },
                { id: 'btn-fokus', label: 'FOKUS (Buff)', action: 'fokus' },
                { id: 'btn-tas', label: '🎒 TAS', action: 'toggleInventory', color: '#f1c40f' },
                { id: 'btn-ultimate', label: `🔥 PAMUNGKAS (${player.ultimateUses}x)`, action: 'ultimate', color: '#ff7675' },
                { id: 'btn-lari', label: 'LARI', action: 'lari' }
            ];

            actions.forEach(act => {
                const btn = document.createElement("button");
                btn.className = "btn-command";
                btn.id = act.id;
                btn.innerHTML = act.label;
                if (act.color) {
                    btn.style.color = act.color;
                    btn.style.borderColor = act.color;
                }
                btn.onclick = () => {
                   if (act.action === 'toggleInventory') toggleInventory();
                   else playerAction(act.action);
                }
                btn.disabled = !isPlayerTurn || gameOver;
                panel.appendChild(btn);
            });
        }
    }

    let isInventoryOpen = false;
    function toggleInventory() {
        if (!isPlayerTurn || gameOver) return;
        isInventoryOpen = !isInventoryOpen;
        renderActionButtons();
    }

    function useItem(itemName) {
        if (player.inventory[itemName] <= 0) return;
        
        player.inventory[itemName]--;
        let msg = "";
        if (itemName === 'Kurma') {
            let heal = 30 + (player.level * 5);
            player.iman = Math.min(player.maxIman, player.iman + heal);
            createParticles(player.x + 50, player.y + 100, "#2ecc71", 30, "heal");
            addFloatingText(player.x + 50, player.y - 20, `+${heal} Iman`, "#2ecc71");
            msg = `Kamu makan Kurma. Segarrr! (+${heal} Iman)`;
        } else if (itemName === 'Air Putih') {
            let healFocus = 20 + (player.level * 2);
            player.konsentrasi = Math.min(player.maxKonsentrasi, player.konsentrasi + healFocus);
            createParticles(player.x + 50, player.y + 100, "#3498db", 30, "heal");
            addFloatingText(player.x + 50, player.y - 20, `+${healFocus} Fokus`, "#3498db");
            msg = `Kamu minum Air Putih. Fokus kembali! (+${healFocus} Fokus)`;
        } else if (itemName === 'Minyak Kayu Putih') {
            player.defenseBuffTurns = 3;
            createParticles(player.x + 50, player.y + 100, "#f1c40f", 30, "heal");
            addFloatingText(player.x + 50, player.y - 20, `DEFENSE BUFF!`, "#f1c40f");
            msg = `Mengoleskan Minyak Kayu Putih. Kehangatan batin meningkat! (Defense UP)`;
        }
        
        log(msg);
        isInventoryOpen = false;
        finishPlayerTurn();
    }

    function spawnEnemy() {
        let enemyTemplate;
        if (timeMinutes >= 17 * 60 + 30) enemyTemplate = enemyTypes[3]; // Boss Naga
        else if (timeMinutes >= 17 * 60) enemyTemplate = enemyTypes[2]; // Iklan Sirop Legend
        else enemyTemplate = enemyTypes[Math.floor(Math.random() * 2)];

        let hoursPassed = Math.floor((timeMinutes - (15 * 60)) / 60);
        let multiplier = 1.0 + (hoursPassed * 0.25); // Scaling lebih sakit

        currentEnemy = {
            name: enemyTemplate.name,
            maxHp: enemyTemplate.maxHp * multiplier,
            hp: enemyTemplate.maxHp * multiplier,
            attack: enemyTemplate.attack * multiplier,
            pixelData: enemyTemplate.pixelData,
            w: enemyTemplate.w, h: enemyTemplate.h,
            x: baseEnemyX, y: baseEnemyY,
            state: 'idle', blinkTimer: 0
        };

        log(`Seekor <span style="color:#e74c3c; font-weight:bold;">${currentEnemy.name}</span> muncul menggoda imanmu!`);
        createParticles(baseEnemyX + 60, baseEnemyY + 50, "#fff", 20); // Efek spawn
        updateUI();
    }

    function triggerEndGame(isWin) {
        gameOver = true;
        updateUI();
        
        let endMsg = isWin ? 
            "✨ ALHAMDULILLAH! Kamu berhasil menahan godaan dan sampai di garis finish bedug Maghrib. Selamat berbuka puasa dengan yang manis-manis!" : 
            "💀 YAHHH! Imanmu goyah di tengah jalan. Monster takjil berhasil membuatmu mokel. Jangan lupa ganti puasanya ya!";
            
        log(`<br><span style='color:${isWin ? '#f1c40f' : '#e74c3c'}; font-size: 14px; line-height: 1.5;'><b>✨ NARRATOR:</b><br>"${endMsg}"</span>`);
    }

    function advanceTime() {
        timeMinutes += 5; 
        if (timeMinutes >= endTime) {
            log("<br><span style='color:#f1c40f; font-size: 14px;'>ALHAMDULILLAH! WAKTU BUKA PUASA TELAH TIBA! KAMU MENANG!</span>");
            triggerEndGame(true);
            return true;
        }
        return false;
    }

    // --- AKSI PEMAIN (DENGAN ANIMASI) ---
    function playerAction(action) {
        if (!isPlayerTurn || gameOver) return;
        let actionTaken = false;

        switch(action) {
            case 'serang':
                isPlayerTurn = false;
                player.state = 'attack';
                updateUI();
                
                // Animasi Maju
                let attackInterval = setInterval(() => {
                    player.x = lerp(player.x, baseEnemyX - 80, 0.3);
                    if (Math.abs(player.x - (baseEnemyX - 80)) < 5) {
                        clearInterval(attackInterval);
                        
                        // Eksekusi Damage
                        let isBuffed = player.buffTurns > 0;
                        let dmg = player.baseAttack * (isBuffed ? 1.5 : 1);
                        if (isBuffed) player.buffTurns--;
                        
                        currentEnemy.hp -= dmg;
                        currentEnemy.blinkTimer = 15; 
                        screenShake = isBuffed ? 12 : 6; 
                        
                        createParticles(currentEnemy.x + 60, currentEnemy.y + 50, "#fff", 15);
                        addFloatingText(currentEnemy.x + 60, currentEnemy.y, `-${Math.floor(dmg)}`, "#e74c3c", isBuffed);
                        log(`Kamu menyabetkan spatula! ${currentEnemy.name} menerima ${Math.floor(dmg)} damage.`);
                        
                        // Animasi Mundur
                        setTimeout(() => {
                            let retreatInterval = setInterval(() => {
                                player.x = lerp(player.x, basePlayerX, 0.2);
                                if (Math.abs(player.x - basePlayerX) < 2) {
                                    player.x = basePlayerX;
                                    player.state = 'idle';
                                    clearInterval(retreatInterval);
                                    finishPlayerTurn();
                                }
                            }, 16);
                        }, 200);
                    }
                }, 16);
                return; // Tunggu animasi selesai
                
            case 'sabar':
                if (player.konsentrasi >= 10) {
                    player.konsentrasi -= 10;
                    let heal = 40;
                    player.iman = Math.min(player.maxIman, player.iman + heal);
                    player.state = 'heal';
                    createParticles(player.x + 50, player.y + 100, "#2ecc71", 30, "heal");
                    addFloatingText(player.x + 50, player.y - 20, `+${heal}`, "#2ecc71");
                    log(`Kamu bersabar. Memulihkan <span style="color:#2ecc71">${heal} Iman</span>.`);
                    
                    setTimeout(() => { player.state = 'idle'; finishPlayerTurn(); }, 600);
                    actionTaken = true;
                } else { log("Konsentrasi tidak cukup!"); }
                break;

            case 'fokus':
                if (player.konsentrasi >= 15) {
                    player.konsentrasi -= 15;
                    player.buffTurns = 3;
                    player.state = 'heal';
                    createParticles(player.x + 50, player.y + 100, "#3498db", 30, "heal");
                    addFloatingText(player.x + 50, player.y - 20, `FOKUS!`, "#3498db", true);
                    log(`Kamu fokus! Attack meningkat 50% untuk 3 serangan.`);
                    
                    setTimeout(() => { player.state = 'idle'; finishPlayerTurn(); }, 600);
                    actionTaken = true;
                } else { log("Konsentrasi tidak cukup!"); }
                break;

            case 'nasihat':
                // Fitur Nasihat sekarang digabung ke Level Up
                break;

            case 'ultimate':
                if (player.ultimateUses <= 0) {
                    log("Jurus Pamungkas sudah habis!");
                    return;
                }
                if (player.konsentrasi >= 30 && player.iman > 20) {
                    player.konsentrasi -= 30;
                    player.iman -= 20; 
                    player.ultimateUses--;
                    
                    isPlayerTurn = false;
                    player.state = 'attack';
                    updateUI();
                    
                    log("<br><b style='color:#ff7675; font-size:12px;'>🔥 PAMUNGKAS: 64-BIT SMASH!</b>");
                    screenShake = 40;
                    createParticles(player.x + 80, player.y + 80, "#fff", 50, "burst");
                    createParticles(player.x + 80, player.y + 80, "#ff7675", 50, "burst");
                    
                    // Animasi Dash Pamungkas
                    let attackInterval = setInterval(() => {
                        player.x = lerp(player.x, baseEnemyX - 80, 0.4);
                        if (Math.abs(player.x - (baseEnemyX - 80)) < 5) {
                            clearInterval(attackInterval);
                            
                            let dmg = player.baseAttack * 3.5; // Damage Spesial Besar
                            currentEnemy.hp -= dmg;
                            currentEnemy.blinkTimer = 20; 
                            screenShake = 30; // Getaran masif
                            
                            createParticles(currentEnemy.x + 60, currentEnemy.y + 50, "#ff7675", 60);
                            addFloatingText(currentEnemy.x + 60, currentEnemy.y - 10, `CRITICAL -${Math.floor(dmg)}!`, "#ff7675", true);
                            
                            setTimeout(() => {
                                let retreatInterval = setInterval(() => {
                                    player.x = lerp(player.x, basePlayerX, 0.2);
                                    if (Math.abs(player.x - basePlayerX) < 2) {
                                        player.x = basePlayerX;
                                        player.state = 'idle';
                                        clearInterval(retreatInterval);
                                        finishPlayerTurn();
                                    }
                                }, 16);
                            }, 400);
                        }
                    }, 16);
                    return;
                } else { 
                    log("Butuh minimal 30 Fokus dan 21 Iman untuk pamungkas!"); 
                }
                break;

            case 'lari':
                if (timeMinutes < 17 * 60) {
                    log(`Kamu memalingkan wajah dan lari dari ${currentEnemy.name}!`);
                    createParticles(player.x + 50, player.y + 80, "#ecf0f1", 20); // Efek debu lari
                    if(advanceTime()) return; 
                    setTimeout(() => { spawnEnemy(); updateUI(); }, 500);
                    return; 
                }
                break;
        }

        if (actionTaken && action !== 'serang') updateUI(); // Fallback jika bukan serang yang panggil finish otomatis
    }
    
    function finishPlayerTurn() {
        isPlayerTurn = false;
        updateUI();
        
        if (currentEnemy.hp <= 0) {
            setTimeout(() => {
                log(`<b>${currentEnemy.name}</b> berhasil ditepis!`);
                player.konsentrasi = Math.min(player.maxKonsentrasi, player.konsentrasi + 10);
                createParticles(currentEnemy.x + 60, currentEnemy.y + 50, currentEnemy.pixelData === sprGorengan ? "#e67e22" : "#0984e3", 40);
                
                // Level Up Logic
                player.level++;
                player.maxIman += 20;
                player.iman = Math.min(player.maxIman, player.iman + 30);
                player.maxKonsentrasi += 5;
                player.konsentrasi = Math.min(player.maxKonsentrasi, player.konsentrasi + 10);
                log(`<span style="color:#f1c40f">LEVEL UP! Level ${player.level}. Iman & Fokus meningkat!</span>`);

                currentEnemy = null;
                
                if(advanceTime()) return;
                setTimeout(() => { spawnEnemy(); isPlayerTurn = true; updateUI(); }, 1000);
            }, 800);
        } else {
            if(advanceTime()) return;
            setTimeout(enemyTurn, 1000); 
        }
    }

    // --- AKSI MUSUH (DENGAN ANIMASI) ---
    function enemyTurn() {
        if (gameOver || !currentEnemy) return;

        currentEnemy.state = 'attack';
        
        // Animasi Musuh Maju
        let attackInterval = setInterval(() => {
            currentEnemy.x = lerp(currentEnemy.x, basePlayerX + 80, 0.3);
            if (Math.abs(currentEnemy.x - (basePlayerX + 80)) < 5) {
                clearInterval(attackInterval);
                
                // Eksekusi Damage
                let dmg = Math.floor(currentEnemy.attack * (0.8 + Math.random() * 0.5));
                
                // Skill Pasif: Sabar Tiada Batas
                if (player.iman < (player.maxIman * 0.3)) {
                    dmg = Math.floor(dmg * 0.6);
                    log("<i style='color:#f1c40f'>Pasif: Sabar Tiada Batas aktif! Damage berkurang.</i>");
                }

                // Item Buff: Minyak Kayu Putih
                if (player.defenseBuffTurns > 0) {
                    dmg = Math.floor(dmg * 0.7);
                    player.defenseBuffTurns--;
                }

                player.iman -= dmg;
                player.hitTimer = 15; 
                screenShake = 15; 
                
                createParticles(player.x + 50, player.y + 50, "#e74c3c", 20);
                addFloatingText(player.x + 50, player.y - 10, `-${dmg}`, "#e74c3c", true);
                log(`<b>${currentEnemy.name}</b> menggoda! Imanmu berkurang <span style="color:#e74c3c">${dmg}</span>.`);

                // Animasi Musuh Mundur
                setTimeout(() => {
                    let retreatInterval = setInterval(() => {
                        currentEnemy.x = lerp(currentEnemy.x, baseEnemyX, 0.2);
                        if (Math.abs(currentEnemy.x - baseEnemyX) < 2) {
                            currentEnemy.x = baseEnemyX;
                            currentEnemy.state = 'idle';
                            clearInterval(retreatInterval);
                            
                            // Cek Kalah
                            if (player.iman <= 0) {
                                log("<br><span style='color:#e74c3c; font-size: 14px;'>IMANMU RUNTUH! KAMU BATAL PUASA! GAME OVER!</span>");
                                player.iman = 0;
                                triggerEndGame(false);
                            } else {
                                isPlayerTurn = true;
                                updateUI();
                            }
                        }
                    }, 16);
                }, 200);
            }
        }, 16);
    }

    // --- RENDER VISUAL (CANVAS) ---
    let frameCount = 0;

    // Fungsi Render Pixel Art Musuh
    function drawPixelArt(ctx, x, y, size, dataMatrix) {
        let pSize = size;
        for (let row = 0; row < dataMatrix.length; row++) {
            let str = dataMatrix[row];
            for (let col = 0; col < str.length; col++) {
                let char = str[col];
                if (pal[char] && pal[char] !== "transparent") {
                    ctx.fillStyle = pal[char];
                    ctx.fillRect(x + col * pSize, y + row * pSize, pSize, pSize);
                }
            }
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frameCount++;

        ctx.save(); 

        // Efek Screen Shake
        if (screenShake > 0) {
            let dx = (Math.random() - 0.5) * screenShake;
            let dy = (Math.random() - 0.5) * screenShake;
            ctx.translate(dx, dy);
            screenShake *= 0.8; // redam shake perlahan
            if(screenShake < 0.5) screenShake = 0;
        }

        // 1. Background Langit (Dinamis & Premium)
        let timeProgress = Math.min(1, (timeMinutes - 900) / (1080 - 900)); 
        let r1 = Math.floor(74 - (40 * timeProgress));
        let g1 = Math.floor(144 - (80 * timeProgress));
        let b1 = Math.floor(226 - (120 * timeProgress));
        
        let r2 = Math.floor(144 - (100 * timeProgress));
        let g2 = Math.floor(200 - (150 * timeProgress));
        let b2 = Math.floor(255 - (200 * timeProgress));
        
        // Golden Hour Effect
        if (timeProgress > 0.7) {
            let gold = (timeProgress - 0.7) / 0.3;
            r2 = Math.floor(r2 * (1-gold) + 241 * gold);
            g2 = Math.floor(g2 * (1-gold) + 196 * gold);
            b2 = Math.floor(b2 * (1-gold) + 15 * gold);
        }

        let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, `rgb(${r1}, ${g1}, ${b1})`);
        gradient.addColorStop(1, `rgb(${r2}, ${g2}, ${b2})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Vignette effect
        let vig = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, 500);
        vig.addColorStop(0, "transparent");
        vig.addColorStop(1, "rgba(0,0,0,0.3)");
        ctx.fillStyle = vig;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Lantai / Tanah dengan grid sederhana
        ctx.fillStyle = "#2d3436";
        ctx.fillRect(0, 270, canvas.width, 80);
        
        // Render Siluet Masjid (Visual Background 64-bit)
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        ctx.beginPath();
        ctx.moveTo(350, 270); ctx.lineTo(350, 200); ctx.lineTo(380, 170); ctx.lineTo(410, 200); ctx.lineTo(410, 270);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(380, 170, 25, 0, Math.PI, true);
        ctx.fill();
        
        ctx.strokeStyle = "#1e272e";
        ctx.lineWidth = 2;
        for(let i=0; i<canvas.width; i+=40) {
            ctx.beginPath(); ctx.moveTo(i, 270); ctx.lineTo(i - 20, canvas.height); ctx.stroke();
        }

        // 2. Render Player (Sekarang pakai Native Pixel Art)
        let py = player.y;
        
        // Animasi napas idle
        if(player.state === 'idle') py += Math.sin(frameCount * 0.05) * 4; 
        
        if (player.hitTimer > 0) {
            player.hitTimer--;
            if (player.hitTimer % 4 < 2) ctx.globalAlpha = 0.5; // Kedap kedip
        }
        
        // Gambar bayangan di tanah
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(player.x + 60, 290, 40, 10, 0, 0, Math.PI*2);
        ctx.fill();

        // Render Sprite Player
        let playerSprite = (player.state === 'attack') ? sprPlayerAttack : sprPlayerIdle;
        drawPixelArt(ctx, player.x, py, 8, playerSprite);
            
        // Aura buff (Jika fokus)
        if (player.buffTurns > 0) {
            ctx.globalAlpha = 0.3 + Math.sin(frameCount*0.1)*0.1;
            ctx.fillStyle = "#3498db";
            ctx.beginPath();
            ctx.ellipse(player.x + 60, py + 110, 50, 15, 0, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.globalAlpha = 1.0;

        // 3. Render Musuh (Pixel Art)
        if (currentEnemy && currentEnemy.hp > 0) {
            let ey = currentEnemy.y;
            
            if (currentEnemy.state === 'idle') {
                ey += Math.sin(frameCount * 0.1) * (currentEnemy.pixelData === sprEsBuah ? 10 : 3); // Es buah lebih melayang
            }

            if (currentEnemy.blinkTimer > 0) {
                currentEnemy.blinkTimer--;
                let kb = currentEnemy.blinkTimer % 2 === 0 ? 8 : -8; // Knockback visual
                ctx.globalCompositeOperation = "source-atop"; // Flash putih
                drawPixelArt(ctx, currentEnemy.x + kb, ey, 8, currentEnemy.pixelData);
                ctx.fillStyle = "rgba(255,255,255,0.7)";
                ctx.fillRect(currentEnemy.x + kb - 10, ey - 10, currentEnemy.w + 20, currentEnemy.h + 20);
                ctx.globalCompositeOperation = "source-over";
            } else {
                // Gambar shadow
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                ctx.beginPath();
                ctx.ellipse(currentEnemy.x + currentEnemy.w/2, 290, 40, 10, 0, 0, Math.PI*2);
                ctx.fill();
                // Gambar sprite pixel art
                drawPixelArt(ctx, currentEnemy.x, ey, 8, currentEnemy.pixelData);
            }
        }

        // 4. Render Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 50;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            
            if (p.life <= 0) particles.splice(i, 1);
        }
        ctx.globalAlpha = 1.0;

        // 5. Render Floating Texts
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let ft = floatingTexts[i];
            ctx.globalAlpha = Math.max(0, ft.alpha);
            ctx.fillStyle = ft.color;
            ctx.font = `bold ${ft.size}px 'Press Start 2P', cursive`;
            ctx.textAlign = "center";
            
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#000";
            ctx.strokeText(ft.text, ft.x, ft.y);
            ctx.fillText(ft.text, ft.x, ft.y);
            
            ft.y += ft.vy; 
            ft.alpha -= 0.02; 
            ft.life--;
            
            if (ft.life <= 0 || ft.alpha <= 0) {
                floatingTexts.splice(i, 1);
            }
        }

        ctx.restore(); 
        requestAnimationFrame(render);
    }

    // Mulai Game
    initGame();
    render();

</script>
